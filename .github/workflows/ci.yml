name: Xéétali CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        cd backend
        pip install -r requirements.txt
        
    - name: Lint with Ruff (Backend)
      run: |
        pip install ruff
        cd backend
        ruff check .
        
    - name: Test with pytest
      env:
        DATABASE_URL: sqlite:///:memory: # Test en mémoire pour CI rapide
      run: |
        cd backend
        pytest -v

  build-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js 18
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Install dependencies
      run: |
        cd frontend
        npm ci
        
    - name: Type checking and Linting
      run: |
        cd frontend
        npm run build # Le build vérifie tsc
