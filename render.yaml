# render.yaml — Configuration de déploiement Render pour Xeetali
# Docs : https://render.com/docs/blueprint-spec

services:
  # ─── Backend FastAPI ───────────────────────────────────────────────────────
  - type: web
    name: xeetali-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: xeetali-db
          property: connectionString

      - key: JWT_SECRET
        generateValue: true   # Render génère automatiquement une valeur sécurisée

      # Remplacez par votre URL Vercel après le premier déploiement frontend
      # Ex : https://xeetali.vercel.app
      - key: CORS_ORIGINS
        value: "https://xeetali.vercel.app"

    healthCheckPath: /health

# ─── Base de données PostgreSQL ─────────────────────────────────────────────
databases:
  - name: xeetali-db
    plan: free
    databaseName: xeetali_db
    user: xeetali
